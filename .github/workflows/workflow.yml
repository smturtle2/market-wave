name: Python

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to publish
        required: true
        default: v1.0.0

permissions:
  contents: read

jobs:
  publish:
    name: Build and publish package
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out release source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build frontend
        run: python -m pip install --upgrade build

      - name: Verify tag matches project version
        run: |
          python - <<'PY'
          import os
          import re
          import sys
          import tomllib

          ref = os.environ["GITHUB_REF_NAME"]
          if os.environ["GITHUB_EVENT_NAME"] == "workflow_dispatch":
              ref = "${{ inputs.ref }}"

          if not re.fullmatch(r"v\d+\.\d+\.\d+", ref):
              print(f"Publish ref must be vX.Y.Z; got {ref}", file=sys.stderr)
              sys.exit(1)

          with open("pyproject.toml", "rb") as pyproject:
              project_version = tomllib.load(pyproject)["project"]["version"]

          tag_version = ref.removeprefix("v")
          if tag_version != project_version:
              print(
                  f"Tag version {tag_version} does not match pyproject.toml project.version {project_version}",
                  file=sys.stderr,
              )
              sys.exit(1)
          PY

      - name: Build distributions
        run: python -m build

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
