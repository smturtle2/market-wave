name: Python

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --extra dev
      - run: uv run ruff check .
      - run: uv run pytest

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify tag matches project version
        run: |
          python - <<'PY'
          import os
          import re
          import sys
          import tomllib

          ref = os.environ["GITHUB_REF"]
          ref_name = os.environ["GITHUB_REF_NAME"]

          if not re.fullmatch(r"refs/tags/v\d+\.\d+\.\d+", ref):
              print(f"Publish tags must use refs/tags/vX.Y.Z; got {ref}", file=sys.stderr)
              sys.exit(1)

          with open("pyproject.toml", "rb") as pyproject:
              project_version = tomllib.load(pyproject)["project"]["version"]

          tag_version = ref_name.removeprefix("v")
          if tag_version != project_version:
              print(
                  f"Tag version {tag_version} does not match pyproject.toml project.version {project_version}",
                  file=sys.stderr,
              )
              sys.exit(1)
          PY
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
